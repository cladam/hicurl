name: Build, test and publish

permissions:
  contents: write

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test:
    name: Unit tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Koka compiler
        run: |
          curl -sSL https://github.com/koka-lang/koka/releases/latest/download/install.sh | sudo sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install hica compiler
        run: |
          curl -fsSL https://www.hica.dev/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Verify compiler versions
        run: |
          koka --version
          hica --version

      - name: Install C library dependencies (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev

      - name: Run unit tests
        run: |
          set +e
          failed=0
          ran=0
          for f in tests/*_test.hc; do
            [ -e "$f" ] || continue
            ran=$((ran + 1))
            echo "=== $f ==="
            output=$(hica test "$f" 2>&1)
            echo "$output"
            if echo "$output" | grep -q 'failed'; then
              failed=1
            fi
          done
          if [ "$ran" -eq 0 ]; then
            echo "error: no test files matched tests/*_test.hc"
            failed=1
          fi
          exit $failed

  release:
    name: Build and publish release binary (${{ matrix.os }})
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            binary_name: hicurl-linux-x86_64
          - os: macos-latest
            binary_name: hicurl-macos-arm64
    steps:
      - uses: actions/checkout@v4

      - name: Install Koka compiler
        run: |
          curl -sSL https://github.com/koka-lang/koka/releases/latest/download/install.sh | sudo sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install hica compiler
        run: |
          curl -fsSL https://www.hica.dev/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install C library dependencies (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev

      - name: Build release binary (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sed -i \
            -e 's| --ccincdir=/opt/homebrew/include||g' \
            -e 's| --cclinkopts=-L/opt/homebrew/lib||g' \
            hica.hml
          hica fetch && hica build -o ${{ matrix.binary_name }}

      - name: Build release binary (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          hica fetch && hica build -o ${{ matrix.binary_name }}

      - name: Create GitHub release and upload binary
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ${{ matrix.binary_name }}
