name: Build, test and publish

permissions:
  contents: read

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test:
    name: Unit tests (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Koka compiler
        run: |
          curl -sSL https://github.com/koka-lang/koka/releases/latest/download/install.sh | sudo sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install hica compiler
        run: |
          curl -fsSL https://www.hica.dev/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Verify compiler versions
        run: |
          koka --version
          hica --version

      - name: Install C library dependencies (libcurl, libmicrohttpd)
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev libmicrohttpd-dev

      - name: Run unit tests
        run: |
          set +e
          failed=0
          ran=0
          for f in tests/test_*.hc; do
            [ -e "$f" ] || continue
            ran=$((ran + 1))
            echo "=== $f ==="
            output=$(hica test "$f" 2>&1)
            echo "$output"
            if echo "$output" | grep -q 'failed'; then
              failed=1
            fi
          done
          if [ "$ran" -eq 0 ]; then
            echo "error: no test files matched tests/test_*.hc"
            failed=1
          fi
          exit $failed

      - name: Run integration tests
        run: |
          chmod +x tests/integration_test.sh
          ./tests/integration_test.sh

  docker:
    name: Build Docker image and smoke test
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry (ghcr.io)
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tags and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build image locally (for smoke test)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: hica-registry:smoke
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test
        run: |
          docker run -d --name registry-smoke \
            -p 8080:8080 \
            -e HICA_REGISTRY_ADMIN_TOKEN_HASH=sha256:abc123 \
            hica-registry:smoke
          for i in $(seq 1 20); do
            if curl -sf http://localhost:8080/health > /dev/null; then
              break
            fi
            sleep 1
          done
          if ! curl -sf http://localhost:8080/health > /dev/null; then
            echo "Server did not start — container logs:"
            docker logs registry-smoke
            docker stop registry-smoke
            exit 1
          fi
          # Format assertions (status/db fields) are covered by unit tests in
          # test_read.hc. The smoke test only verifies the container starts and
          # the health endpoint returns HTTP 200.
          echo "Smoke test passed: /health returned HTTP 200"
          docker stop registry-smoke

      - name: Push image to GitHub Container Registry (ghcr.io)
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha

  release:
    name: Build and publish release binary
    if: startsWith(github.ref, 'refs/tags/v')
    needs: docker
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Koka compiler
        run: |
          curl -sSL https://github.com/koka-lang/koka/releases/latest/download/install.sh | sudo sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install hica compiler
        run: |
          curl -fsSL https://www.hica.dev/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install C library dependencies (libcurl, libmicrohttpd, libsqlite3)
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev libmicrohttpd-dev libsqlite3-dev

      - name: Build release binary (linux/x86_64)
        run: |
          sed -i \
            -e 's| --ccincdir=/opt/homebrew/include||g' \
            -e 's| --cclinkopts=-L/opt/homebrew/lib||g' \
            hica.hml
          hica fetch && hica build -o hica-registry-linux-x86_64

      - name: Create GitHub release and upload binary
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: hica-registry-linux-x86_64
