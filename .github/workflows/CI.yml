name: Build, Test, and Release

permissions:
  contents: write

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Test (${{ matrix.artifact }})
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: hicurl-linux-x86_64
          - os: ubuntu-24.04-arm
            artifact: hicurl-linux-arm64
          - os: macos-latest
            artifact: hicurl-macos-arm64
          - os: windows-latest
            artifact: hicurl-windows-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Koka (Unix)
        if: runner.os != 'Windows'
        run: |
          curl -sSL https://github.com/koka-lang/koka/releases/latest/download/install.sh | sudo sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install Koka (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          curl -sSL -o "$env:TEMP\install-koka.bat" https://github.com/koka-lang/koka/releases/latest/download/install.bat
          & "$env:TEMP\install-koka.bat"
          "$env:LOCALAPPDATA\koka\bin" | Out-File -Append -FilePath $env:GITHUB_PATH

      - name: Install hica compiler (Unix)
        if: runner.os != 'Windows'
        run: |
          curl -fsSL https://www.hica.dev/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install hica compiler (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          curl -fsSL -o "$env:TEMP\install-hica.ps1" https://www.hica.dev/install.ps1
          & "$env:TEMP\install-hica.ps1"
          "$env:LOCALAPPDATA\hica" | Out-File -Append -FilePath $env:GITHUB_PATH

      - name: Verify compiler versions
        run: |
          koka --version
          hica --version
        shell: bash

      - name: Install libcurl (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev

      - name: Install libcurl (macOS)
        if: runner.os == 'macOS'
        run: brew install curl

      - name: Install libcurl (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          vcpkg install curl:x64-windows
          vcpkg integrate install
          Copy-Item C:\vcpkg\installed\x64-windows\lib\libcurl.lib C:\v2-curl.lib -ErrorAction SilentlyContinue
          Copy-Item C:\vcpkg\installed\x64-windows\lib\libcurl.lib C:\vcpkg\installed\x64-windows\lib\curl.lib -Force
          Copy-Item C:\vcpkg\installed\x64-windows\bin\*.dll . -Force -ErrorAction SilentlyContinue
          Copy-Item C:\vcpkg\installed\x64-windows\bin\*.dll $env:LOCALAPPDATA\hica\ -Force -ErrorAction SilentlyContinue
          "C:\vcpkg\installed\x64-windows\bin" | Out-File -Append -FilePath $env:GITHUB_PATH

      - name: Adjust hica.hml for Linux
        if: runner.os == 'Linux'
        run: |
          sed -i \
            -e 's| --ccincdir=/opt/homebrew/include||g' \
            -e 's| --cclinkopts=-L/opt/homebrew/lib||g' \
            hica.hml

      - name: Adjust hica.hml for Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          (Get-Content hica.hml) -replace '--ccincdir=/opt/homebrew/include', '--ccopts=-IC:/vcpkg/installed/x64-windows/include' -replace '--cclinkopts=-L/opt/homebrew/lib', '--cclinkopts=/LIBPATH:C:/vcpkg/installed/x64-windows/lib' | Set-Content hica.hml

      - name: Build binary
        shell: bash
        run: |
          mkdir -p "$HOME/.hica/stdlib"
          hica fetch
          hica build -o hicurl

      - name: Run unit tests (Unix)
        if: runner.os != 'Windows'
        run: |
          set +e
          failed=0
          ran=0
          for f in tests/*_test.hc; do
            [ -e "$f" ] || continue
            ran=$((ran + 1))
            echo "=== $f ==="
            output=$(hica test "$f" 2>&1)
            echo "$output"
            if echo "$output" | grep -q 'failed'; then
              failed=1
            fi
          done
          if [ "$ran" -eq 0 ]; then
            echo "error: no test files matched tests/*_test.hc"
            failed=1
          fi
          exit $failed

      - name: Run unit tests (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $failed = 0
          $ran = 0
          Get-ChildItem tests/*_test.hc | ForEach-Object {
            $ran++
            $f = $_.FullName
            Write-Host "=== $f ==="
            $output = & hica test $f 2>&1
            Write-Host $output
            if ($output -match "failed") {
              $failed = 1
            }
          }
          if ($ran -eq 0) {
            Write-Error "error: no test files matched tests/*_test.hc"
            exit 1
          }
          if ($failed -eq 1) {
            exit 1
          }

      - name: Strip binary (Linux)
        if: runner.os == 'Linux'
        run: strip hicurl

      - name: Ad-hoc codesign (macOS)
        if: runner.os == 'macOS'
        run: codesign --sign - --force hicurl

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: tar czf ${{ matrix.artifact }}.tar.gz hicurl

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path hicurl.exe -DestinationPath ${{ matrix.artifact }}.zip

      - name: Upload artifact (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.zip

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.tar.gz
            *.zip
          generate_release_notes: true
